<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشكاوى والمقترحات | منصة الشباب والرياضة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="overlay" id="overlay"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><img src="logo.png" alt="المنصة"></div>
                <h3 data-i18n="user_title">مديرية الشباب والرياضة</h3>
                <p data-i18n="user_subtitle">القليوبية | منصتك الذكية</p>
            </div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="user-dashboard.html" class="nav-link"><i class="fas fa-home"></i><span data-i18n="home">الرئيسية</span></a></li>
                <li class="nav-item"><a href="user-centers.html" class="nav-link"><i class="fas fa-building"></i><span data-i18n="centers">المراكز الشبابية</span></a></li>
                <li class="nav-item"><a href="user-ideas.html" class="nav-link"><i class="fas fa-lightbulb"></i><span data-i18n="ideas">بنك الأفكار</span></a></li>
                <li class="nav-item"><a href="user-challenges.html" class="nav-link"><i class="fas fa-trophy"></i><span data-i18n="challenges">التحديات</span></a></li>
                <li class="nav-item"><a href="user-complaints.html" class="nav-link active"><i class="fas fa-comment-dots"></i><span data-i18n="complaints">الشكاوى</span></a></li>
                <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i><span data-i18n="settings">الإعدادات</span></a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="btn btn-outline" id="menuToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" data-i18n="search" placeholder="بحث في شكاواك...">
                    </div>
                </div>
                <div class="header-right">
                    <div class="points-badge"><i class="fas fa-star"></i><span id="userPoints">0</span> <span data-i18n="points">نقطة</span></div>
                    <div class="user-profile-header" onclick="window.logout()">
                        <div class="user-avatar" id="userAvatar">م</div>
                        <div class="user-info-text">
                            <h4 id="userName" data-i18n="loading">جاري التحميل...</h4>
                            <span style="color: var(--error);" data-i18n="logout">تسجيل الخروج</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header fade-in">
                    <div>
                        <h1 data-i18n="complaints_page_title">الشكاوى والمقترحات 💬</h1>
                        <p style="color: var(--text-muted);" data-i18n="complaints_page_desc">صوتك مسموع.. أرسل شكواك أو مقترحك وسنعمل على حله في أسرع وقت.</p>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;" class="fade-in">
                    <!-- Complaint Form -->
                    <div class="card">
                        <h3 style="margin-bottom: 20px;" data-i18n="submit_new_request">تقديم طلب جديد</h3>
                        <form id="complaintForm">
                            <div class="form-group">
                                <label data-i18n="select_center">اختر المركز</label>
                                <select id="complaintCenter" class="form-control" required>
                                    <option value="" disabled selected>اختر المركز المعني...</option>
                                    <!-- Centers will be loaded here -->
                                </select>
                            </div>
                            <div class="form-group">
                                <label data-i18n="request_type">نوع الطلب</label>
                                <select id="complaintType" class="form-control" required>
                                    <option value="شكوى" data-i18n="complaint">شكوى</option>
                                    <option value="مقترح" data-i18n="suggestion">مقترح تطوير</option>
                                    <option value="صيانة" data-i18n="maintenance">طلب صيانة</option>
                                    <option value="أخرى" data-i18n="other">أخرى</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label data-i18n="request_title">العنوان</label>
                                <input type="text" id="complaintTitle" class="form-control" data-i18n="request_title_placeholder" placeholder="عنوان مختصر للمشكلة" required>
                            </div>
                            <div class="form-group">
                                <label data-i18n="request_details">التفاصيل</label>
                                <textarea id="complaintDesc" class="form-control" rows="5" data-i18n="request_details_placeholder" placeholder="اشرح لنا المشكلة أو المقترح بالتفصيل..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="send_request">إرسال الطلب</button>
                        </form>
                    </div>

                    <!-- Complaints History -->
                    <div class="card">
                        <h3 style="margin-bottom: 20px;" data-i18n="my_previous_requests">طلباتي السابقة</h3>
                        <div id="complaintsList" style="display: flex; flex-direction: column; gap: 15px;">
                            <!-- Complaints will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <script src="db.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            loadComplaints();
            populateCenters();

            document.getElementById('complaintForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const user = await window.getLoggedInUser();
                if (!user) return;

                const centerId = parseInt(document.getElementById('complaintCenter').value);
                const type = document.getElementById('complaintType').value;
                const title = document.getElementById('complaintTitle').value;
                const desc = document.getElementById('complaintDesc').value;

                await db.complaints.add({
                    userId: user.id,
                    userName: user.name,
                    centerId: centerId,
                    type: type,
                    title: title,
                    description: desc,
                    status: 'قيد المعالجة',
                    createdAt: new Date()
                });

                showToast('تم إرسال طلبك بنجاح! سنوافيك بالرد قريباً', 'success');
                document.getElementById('complaintForm').reset();
                loadComplaints();
            });
        });

        async function populateCenters() {
            const centers = await db.centers.toArray();
            const select = document.getElementById('complaintCenter');
            centers.forEach(center => {
                const option = document.createElement('option');
                option.value = center.id;
                option.textContent = center.name;
                select.appendChild(option);
            });
        }

        async function loadComplaints() {
            const user = await window.getLoggedInUser();
            if (!user) return;

            const complaints = await db.complaints.where('userId').equals(user.id).reverse().toArray();
            const centers = await db.centers.toArray();
            const list = document.getElementById('complaintsList');

            if (complaints.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:30px; color:var(--text-light);">لا توجد طلبات سابقة</div>';
                return;
            }

            list.innerHTML = complaints.map(c => {
                const centerName = centers.find(center => center.id === c.centerId)?.name || 'مركز غير معروف';
                return `
                <div style="padding:20px; background:var(--bg-body); border-radius:12px; border-right:4px solid ${getStatusColor(c.status)};">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span class="badge" style="background:${getStatusColor(c.status)}15; color:${getStatusColor(c.status)};">${c.status}</span>
                        <span style="font-size:0.8rem; color:var(--text-muted);">${new Date(c.createdAt).toLocaleDateString('ar-EG')}</span>
                    </div>
                    <h4 style="margin-bottom:5px;">${c.title} <small style="color:var(--text-light); font-weight:400;">(${c.type})</small></h4>
                    <div style="font-size:0.85rem; color:var(--primary); margin-bottom:8px;"><i class="fas fa-building"></i> ${centerName}</div>
                    <p style="font-size:0.9rem; color:var(--text-muted);">${c.description}</p>
                </div>
            `}).join('');
        }

        function getStatusColor(status) {
            switch(status) {
                case 'تم الحل': return '#10b981';
                case 'قيد المعالجة': return '#f59e0b';
                case 'مرفوض': return '#ef4444';
                default: return '#3b82f6';
            }
        }
    </script>
</body>
</html>
